<svg xmlns="http://www.w3.org/2000/svg"
     width="650"
     height="760"
     viewBox="0 0 650 760">

    <rect width="100%" height="100%" fill="#0d1117"/>

    <!-- Window -->
    <rect x="15" y="15" rx="8" width="620" height="730"
          fill="#161b22"
          stroke="#30363d"/>

    <!-- Header -->
    <circle cx="40" cy="38" r="6" fill="#ff5f56"/>
    <circle cx="60" cy="38" r="6" fill="#ffbd2e"/>
    <circle cx="80" cy="38" r="6" fill="#27c93f"/>

    <text x="110"
          y="43"
          font-family="monospace"
          font-size="13"
          fill="#8b949e">
Terminal
    </text>

    <!-- Boot messages -->

    <text x="30"
          y="80"
          font-family="monospace"
          font-size="13"
          fill="#58a6ff">

$ booting profile...
<animate attributeName="opacity"
         values="0;1"
         dur="0.3s"
         begin="0s"
         fill="freeze"/>

    </text>

    <text x="30"
          y="100"
          font-family="monospace"
          font-size="13"
          fill="#58a6ff">

Loading modules...
<animate attributeName="opacity"
         values="0;1"
         dur="0.3s"
         begin="0.5s"
         fill="freeze"/>

    </text>

    <text x="30"
          y="120"
          font-family="monospace"
          font-size="13"
          fill="#58a6ff">

Initializing AI engine...
<animate attributeName="opacity"
         values="0;1"
         dur="0.3s"
         begin="1s"
         fill="freeze"/>

    </text>

    <text x="30"
          y="140"
          font-family="monospace"
          font-size="13"
          fill="#58a6ff">

Rendering developer profile...
<animate attributeName="opacity"
         values="0;1"
         dur="0.3s"
         begin="1.5s"
         fill="freeze"/>

    </text>

    <text x="30"
          y="170"
          font-family="monospace"
          font-size="13"
          fill="#3fb950">

████████████████████ 100%
<animate attributeName="opacity"
         values="0;1"
         dur="0.3s"
         begin="2s"
         fill="freeze"/>

    </text>

    <!-- ASCII -->

    <text x="30"
          y="220"
          font-family="monospace"
          font-size="7"
          fill="#58a6ff"
          xml:space="preserve"
          opacity="0">

================#%%%%%%%%%%%%%%%%%%%%%=----------------
===-=-----===#%%%%%%%%%%%%%%%%%%%%%%%%%%*--------------
----------*%%%%%%%%%%%%%%%%##%%%%%#%%%%%%%=------------
--------+%%%%%%%%%%#%%%#%%%%%#%%%%%*%%%%%%%#+++++++++++
-------*%%%%%%#%%%%%#%%%#%%%%%#%%%%%#%%%%%%%#*********+
-----=#%%%%%#%%#%%%%%#%%%#%%%%%%%%%%%%%%%%%%**+++++++++
-----+#%%%%%%#%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%#*++*******
----**%##%%%%%%##%%*%%%*#%%##%%%%%%%#%%%%%%%%#*********
---=-*###*#*%**%##**#*+*#%%%%%%%%%%-:--#%%%%#***+======
---=-##%%*:*-++:=*#+:=**+-#:...==%*::--:#%%%**+*+==++++
-----%%%%*.:+::=+=:+=.-+=.*:.....=+.:-:.*%##*++++===+++
