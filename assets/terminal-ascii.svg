<animate attributeName="opacity"
         from="0"
         to="1"
         begin="2.8s"
         dur="0.8s"
         fill="freeze"/>

    </text>

    <!-- Cursor -->

    <text x="30"
          y="720"
          font-family="monospace"
          font-size="16"
          fill="#58a6ff">

▋

<animate attributeName="opacity"
         values="1;0;1"
         dur="1s"
         repeatCount="indefinite"/>

    </text>

    <!-- Scan line -->

    <rect x="20"
          y="60"
          width="610"
          height="2"
          fill="#58a6ff"
          opacity="0.35">

        <animate attributeName="y"
                 values="60;720;60"
                 dur="6s"
                 repeatCount="indefinite"/>

    </rect>

</svg>