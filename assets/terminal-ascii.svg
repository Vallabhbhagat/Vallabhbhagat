<svg xmlns="http://www.w3.org/2000/svg"
    width="600"
height="600"
viewBox="0 0 600 600">

    <defs>

        <filter id="glow">
            <feGaussianBlur stdDeviation="1.8" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

    </defs>

    <!-- Background -->

    <rect width="100%" height="100%" fill="#0d1117"/>

    <!-- Terminal -->

   <rect
x="15"
y="15"
width="570"
height="570"
rx="8"/>

    <!-- Header -->

    <circle cx="45" cy="45" r="6" fill="#ff5f56"/>
    <circle cx="65" cy="45" r="6" fill="#ffbd2e"/>
    <circle cx="85" cy="45" r="6" fill="#27c93f"/>

    <text
        x="120"
        y="50"
        font-size="13"
        font-family="monospace"
        fill="#8b949e">

        Terminal

    </text>

    <!-- Boot Text -->

    <g font-family="monospace"
       font-size="13"
       fill="#58a6ff">

        <text x="35" y="90" opacity="0">
            $ booting profile...
            <animate attributeName="opacity"
                begin="0s"
                dur="0.3s"
                from="0"
                to="1"
                fill="freeze"/>
        </text>

        <text x="35" y="110" opacity="0">
            Loading modules...
            <animate attributeName="opacity"
                begin="0.4s"
                dur="0.3s"
                from="0"
                to="1"
                fill="freeze"/>
        </text>

        <text x="35" y="130" opacity="0">
            Initializing AI engine...
            <animate attributeName="opacity"
                begin="0.8s"
                dur="0.3s"
                from="0"
                to="1"
                fill="freeze"/>
        </text>

        <text x="35" y="150" opacity="0">
            Loading developer profile...
            <animate attributeName="opacity"
                begin="1.2s"
                dur="0.3s"
                from="0"
                to="1"
                fill="freeze"/>
        </text>

    </g>

    <!-- Progress Bar -->

    <rect
        x="35"
        y="175"
        width="300"
        height="10"
        rx="5"
        fill="#21262d"/>

    <rect
        x="35"
        y="175"
        width="0"
        height="10"
        rx="5"
        fill="#3fb950">

        <animate
            attributeName="width"
            from="0"
            to="300"
            begin="1.5s"
            dur="1.5s"
            fill="freeze"/>

    </rect>

    <text
        x="345"
        y="184"
        font-family="monospace"
        font-size="12"
        fill="#3fb950"
        opacity="0">

        100%

        <animate
            attributeName="opacity"
            begin="3s"
            dur="0.2s"
            from="0"
            to="1"
            fill="freeze"/>

    </text>

    <!-- ===================================================== -->

    <!-- ASCII STARTS HERE -->
    

    <g
        id="ascii"
        filter="url(#glow)"
        opacity="0">

        <animate
            attributeName="opacity"
            begin="3.2s"
            dur="0.8s"
            from="0"
            to="1"
            fill="freeze"/>

        <text
            x="22"
            y="220"
            font-size="9"
            font-family="Courier New, monospace"
            fill="#58a6ff"
            xml:space="preserve">

<!-- PASTE ASCII HERE -->
<tspan x="35" dy="0">================#%%%%%%%%%%%%%%%%%%%%%=----------------</tspan>
<tspan x="35" dy="8">===-=-----===#%%%%%%%%%%%%%%%%%%%%%%%%%%*--------------</tspan>
<tspan x="35" dy="8">----------*%%%%%%%%%%%%%%%%##%%%%%#%%%%%%%=------------</tspan>
<tspan x="35" dy="8">--------+%%%%%%%%%%#%%%#%%%%%#%%%%%*%%%%%%%#+++++++++++</tspan>
<tspan x="35" dy="8">-------*%%%%%%#%%%%%#%%%#%%%%%#%%%%%#%%%%%%%#*********+</tspan>
<tspan x="35" dy="8">-----=#%%%%%#%%#%%%%%#%%%#%%%%%%%%%%%%%%%%%%**+++++++++</tspan>
<tspan x="35" dy="8">-----+#%%%%%%#%%%%%%%%%%%%%%%%%%%%%%%%%%%%%%#*++*******</tspan>
<tspan x="35" dy="8">----**%##%%%%%%##%%*%%%*#%%##%%%%%%%#%%%%%%%%#*********</tspan>
<tspan x="35" dy="8">---=-*###*#*%**%##**#*+*#%%%%%%%%%%-:--#%%%%#***+======</tspan>
<tspan x="35" dy="8">---=-##%%*:*-++:=*#+:=**+-#:...==%*::--:#%%%**+*+==++++</tspan>
<tspan x="35" dy="8">-----%%%%*.:+::=+=:+=.-+=.*:.....=+.:-:.*%##*++++===+++</tspan>
<tspan x="35" dy="8">-----#%%%*++::::#..:...:.:*:.....:..:--=%%*++==+=======</tspan>
<tspan x="35" dy="8">-----=+%%%=-+**##:.......+:.........:-:%%*+++++++++++++</tspan>
<tspan x="35" dy="8">-------=#%%---#=.-#:::=*=.............*%%***+++++++++++</tspan>
<tspan x="35" dy="8">--------+%%#:.::....:...............---%%+==+=====+++++</tspan>
<tspan x="35" dy="8">----------*=-.:-...................::..:=*+++++********</tspan>
<tspan x="35" dy="8">------------+=:::....................:...=+++++*++*****</tspan>
<tspan x="35" dy="8">--------------:.......:..............:..:...-=+*+======</tspan>
<tspan x="35" dy="8">----------------...:............-:..:::.......+*+==++++</tspan>
<tspan x="35" dy="8">==========-=-----:............--:...:..........-+=+++++</tspan>
<tspan x="35" dy="8">=============-----:::......:----..:............::=+++++</tspan>
<tspan x="35" dy="8">===============:.:::.::.::==--:.:..................-+++</tspan>
<tspan x="35" dy="8">==============-..:...:.:.::-=::........::............:+</tspan>
<tspan x="35" dy="8">==============:..-=-.:.:.::+=-.......:.................</tspan>
<tspan x="35" dy="8">=============:...--:.:.::-+=:......:...................</tspan>
<tspan x="35" dy="8">+===========-....:--=-:.:++=:....:.....................</tspan>
<tspan x="35" dy="8">+#+=========-.....:--..:=++=-=..:.--...................</tspan>
<tspan x="35" dy="8">-%+=========......::.:===++=-=+::--:............:-.....</tspan>
<tspan x="35" dy="8">=*+========-.....--=++====+*=-:.---..............:=....</tspan>
<tspan x="35" dy="8">=%++++++===:...:-:.=++====+-*:.:--................:-:..</tspan>
             <animate
    attributeName="opacity"
    from="0"
    to="1"
    begin="2.8s"
    dur="0.8s"
    fill="freeze"/>

        </text>

    </g>

    <!-- ===================================================== -->

    <!-- Cursor -->

    <text
        x="35"
        y="520"
        font-family="monospace"
        font-size="16"
        fill="#58a6ff">

▋

        <animate
            attributeName="opacity"
            values="1;0;1"
            dur="1s"
            repeatCount="indefinite"/>

    </text>

    <!-- Scanline -->

    <rect
        x="30"
        y="60"
        width="660"
        height="2"
        fill="#58a6ff"
        opacity=".25">

        <animate
            attributeName="y"
            values="60;520;60"
            dur="6s"
            repeatCount="indefinite"/>

    </rect>

    <!-- CRT Flicker -->

    <rect
        width="100%"
        height="100%"
        fill="white"
        opacity="0">

        <animate
            attributeName="opacity"
            values="0;0.02;0;0.015;0"
            dur="0.4s"
            repeatCount="indefinite"/>

    </rect>

</svg>
